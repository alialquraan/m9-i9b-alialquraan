name: "Integration 9B — NL→Cypher Autograder"
on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: neo4j/testtest
          NEO4J_dbms_memory_heap_max__size: 1G
          NEO4J_dbms_memory_pagecache_size: 512M
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "wget -q -O - http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 24

    env:
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: testtest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install core deps (NOT requirements-challenge.txt — Tier 3 uses mock LLM cache in CI)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Download spaCy en_core_web_sm
        run: python -m spacy download en_core_web_sm
      - name: Wait for Neo4j Bolt
        run: |
          python - <<'PY'
          import time, sys
          from neo4j import GraphDatabase
          for i in range(60):
              try:
                  d = GraphDatabase.driver("bolt://localhost:7687", auth=("neo4j","testtest"))
                  with d.session() as s: s.run("RETURN 1").consume()
                  d.close(); print("Bolt ready"); sys.exit(0)
              except Exception as e:
                  time.sleep(2)
          sys.exit("Neo4j Bolt never came up")
          PY
      - name: Load fixture and assert acceptance
        run: python load_fixture.py
      - name: Run core deterministic-mapper autograder
        run: pytest tests/test_mapper.py -v --tb=short
      - name: Run Tier 3 autograder (mock LLM cache)
        run: pytest tests/test_challenge_tier3.py -v --tb=short
